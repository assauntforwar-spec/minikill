name: Build web version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Package game into .love
        run: |
          zip -r game.love . -x "*.git*" ".github/*"

      - name: Download and run love.js
        run: |
          npx love.js -c game.love web-build -t "ULTRAMINIKILL"

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build
